<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FollowIQ">
    <title>Follow Tracker</title>
    <!-- v3 forces cache clear -->
    <link rel="stylesheet" href="styles.css?v=3">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body onload="loadDashboardStats()">

    <div class="app-wrapper">
        <h1>Dashboard</h1>

        <div class="glass-card">
            <div class="upload-header">
                <div class="icon-box">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                </div>
                <div class="upload-titles">
                    <span class="upload-title">Instagram Data</span>
                    <span class="upload-subtitle" id="label-files">Select ZIP Export or JSON files</span>
                </div>
            </div>
            <label for="dataFiles" class="custom-file-upload">Select File</label>
            <input type="file" id="dataFiles" accept=".zip, .json" multiple onchange="updateFileName()">
        </div>

        <button id="analyzeBtn" class="btn-primary" onclick="processFiles()">Analyze Data</button>

        <a href="not_following_back.html" class="nav-card">
            <span>Not Following Me Back</span>
            <div class="card-right">
                <span class="count-badge" id="count-not-following">0</span>
                <span class="chevron">›</span>
            </div>
        </a>

        <a href="fans.html" class="nav-card">
            <span>I'm Not Following Back</span>
            <div class="card-right">
                <span class="count-badge" id="count-fans">0</span>
                <span class="chevron">›</span>
            </div>
        </a>

        <a href="mutuals.html" class="nav-card">
            <span>Mutual Connections</span>
            <div class="card-right">
                <span class="count-badge" id="count-mutuals">0</span>
                <span class="chevron">›</span>
            </div>
        </a>
    </div>

    <script src="logic.js?v=3"></script>
    <script>
        function updateFileName() {
            const input = document.getElementById('dataFiles');
            const label = document.getElementById('label-files');
            if (input.files.length === 1) {
                label.innerText = input.files[0].name;
                label.style.color = "var(--primary)";
            } else if (input.files.length > 1) {
                label.innerText = `${input.files.length} Files Selected`;
                label.style.color = "var(--primary)";
            }
        }
    </script>
</body>
</html>
